version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: algoguild-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  backend:
    build: ./server
    container_name: algoguild-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://admin:password123@mongodb:27017/algoguild?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules

  executor:
    build: ./executor
    container_name: algoguild-executor
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    volumes:
      - ./executor:/app
      - /app/node_modules

  frontend:
    build: ./client
    container_name: algoguild-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo-data:
